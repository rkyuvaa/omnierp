version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: erp_db
    environment:
      POSTGRES_USER: ${DB_USER:-erp_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-erp_pass}
      POSTGRES_DB: ${DB_NAME:-erp_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: erp_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-erp_user}:${DB_PASSWORD:-erp_pass}@db:5432/${DB_NAME:-erp_db}
      - SECRET_KEY=${SECRET_KEY:-omni-erp-secret-2024}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=480
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: erp_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
